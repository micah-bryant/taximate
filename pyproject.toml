[project]
name = "taximate"
version = "0.2.1"
description = "Import EveryDollar transactions and calculate tax deductions"
requires-python = ">=3.12"
dependencies = [
    "pandas>=2.0.0",
    "numpy<2.0",
    "PySide6>=6.6.0,<6.8",
]

[dependency-groups]
dev = [
    "ruff>=0.4.0",
    "mypy>=1.10.0",
    "pandas-stubs>=2.0.0",
    "pyinstaller>=6.0.0",
]
