<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Content-Security-Policy (GitHub Pages can't set headers, so it's a meta tag).
      connect-src is locked to this origin + the Pyodide CDN, so uploaded CSVs can't be
      sent anywhere. script-src needs 'wasm-unsafe-eval' (Pyodide WASM) and 'unsafe-eval'
      (Pyodide's boot-time eval probe; also older Safari without wasm-unsafe-eval).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'wasm-unsafe-eval' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://cdn.jsdelivr.net; font-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taximate: Self-Employment Tax Calculator</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>
