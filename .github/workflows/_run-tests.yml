name: _Run Tests

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install (incl. dev tools)
        run: uv sync --group dev

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest --tb=short
