name: Release Taximate

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runs_on: windows-latest
            build_target: build-windows
          - name: mac-intel
            runs_on: macos-15-intel
            build_target: build-mac-intel
          - name: mac-arm64
            runs_on: macos-latest
            build_target: build-mac-arm64

    runs-on: ${{ matrix.runs_on }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: make ${{ matrix.build_target }}

      # Ad-hoc sign macOS apps (reduces Gatekeeper friction)
      - name: Ad-hoc sign macOS app
        if: runner.os == 'macOS'
        run: |
          codesign --deep --force --sign - dist/*.app

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Taximate-${{ matrix.name }}
          path: dist/**
