name: Build executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  pull_request:
    branches:
      - main


jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runs_on: windows-latest
          - name: mac-intel
            runs_on: macos-15-intel
          - name: mac-arm64
            runs_on: macos-latest

    runs-on: ${{ matrix.runs_on }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      # Install dependencies once
      - name: Install
        run: uv sync --group dev

      # On Windows, force bash so rm -rf in Makefile works predictably
      - name: Clean build outputs
        shell: bash
        run: make clean-build

      # Build per-OS using your Makefile targets
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: make build-mac

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: make build-windows

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Taximate-${{ runner.os }}
          path: dist/**
